name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, lights]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman and podman-compose
        run: |
          if ! command -v podman &>/dev/null; then
            sudo dnf install -y podman
          fi
          if ! command -v podman-compose &>/dev/null; then
            sudo dnf install -y podman-compose
          fi

      - name: Build and (re)start service
        run: podman-compose up -d --build

      - name: Wait for service to be healthy
        run: |
          echo "Waiting for service to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/state > /dev/null; then
              echo "Service is alive (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 – not yet, retrying in 5s..."
            sleep 5
          done
          echo "Service did not become healthy after 150s"
          podman-compose logs
          exit 1
