name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: [self-hosted, lights]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Podman and podman-compose
        run: |
          if ! command -v podman &>/dev/null; then
            sudo dnf install -y podman
          fi
          if ! command -v podman-compose &>/dev/null; then
            sudo dnf install -y podman-compose
          fi

      - name: Ensure runner user is in the bluetooth group
        run: |
          # Create the group if BlueZ hasn't made it yet (Fedora server minimal install)
          if ! getent group bluetooth &>/dev/null; then
            sudo groupadd bluetooth
            echo "Created bluetooth group"
          fi
          if ! groups | grep -qw bluetooth; then
            sudo usermod -aG bluetooth "$USER"
            echo "Added $USER to bluetooth group — effective for podman via keep-groups"
          else
            echo "$USER already in bluetooth group"
          fi

      - name: Allow rootless binding to ports 80 and 443
        run: |
          sudo sysctl -w net.ipv4.ip_unprivileged_port_start=80
          # persist across reboots
          echo "net.ipv4.ip_unprivileged_port_start=80" | sudo tee /etc/sysctl.d/99-unprivileged-ports.conf

      - name: Ensure firewalld permits HTTP and HTTPS
        run: |
          if sudo firewall-cmd --state &>/dev/null; then
            sudo firewall-cmd --permanent --add-service=http
            sudo firewall-cmd --permanent --add-service=https
            sudo firewall-cmd --reload
            echo "firewalld: http and https enabled"
          else
            echo "firewalld not running, skipping"
          fi

      - name: Build and (re)start service
        run: podman-compose up -d --build --force-recreate

      - name: Wait for service to be healthy
        run: |
          echo "Waiting for service to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/state > /dev/null; then
              echo "Service is alive (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 – not yet, retrying in 5s..."
            sleep 5
          done
          echo "Service did not become healthy after 150s"
          podman-compose logs
          exit 1

      - name: Prune unused images and build cache
        if: always()
        run: podman system prune -af || true
