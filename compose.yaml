services:
  lights:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    # BLE via BlueZ requires access to the host D-Bus socket and Bluetooth stack
    # keep-id: container runs as the host user UID so D-Bus EXTERNAL auth passes
    # keep-groups: inherits host supplementary groups (incl. bluetooth if present)
    userns_mode: keep-id
    group_add:
      - keep-groups
    volumes:
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - lights_data:/data
    network_mode: host
    privileged: true
    restart: unless-stopped

  proxy:
    build:
      context: proxy
    network_mode: host
    restart: unless-stopped
    depends_on:
      - lights

volumes:
  lights_data:
